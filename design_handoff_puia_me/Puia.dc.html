<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/modernist-b63cd8a6-1c56-4da8-bbb9-04c9c4bb30ef/styles.css">
  <script src="_ds/modernist-b63cd8a6-1c56-4da8-bbb9-04c9c4bb30ef/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    a { color: var(--color-text); }
    a:hover { color: var(--color-accent); }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes drawRule { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes lineUp { from { transform: translateY(110%); } to { transform: translateY(0); } }
    @keyframes blockIn { 0% { transform: scaleX(0); transform-origin: left; } 45% { transform: scaleX(1); transform-origin: left; } 55% { transform: scaleX(1); transform-origin: right; } 100% { transform: scaleX(0); transform-origin: right; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
</helmet>
<div style="min-height: 100vh; display: flex; flex-direction: column; background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); box-sizing: border-box;">
  <header style="display: flex; justify-content: space-between; align-items: baseline; padding: 24px 40px; border-bottom: 2px solid var(--color-divider); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; animation: rise 0.7s cubic-bezier(0.2,0.6,0.2,1) both;">
    <span style="font-weight: 600;">puia.me</span>
    <span style="color: var(--color-neutral-600);">{{ today }}</span>
  </header>
  <main style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 64px 40px; box-sizing: border-box;">
    <div style="max-width: 1100px;">
      <div style="font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-accent-700); margin-bottom: 28px; animation: rise 0.7s 0.15s cubic-bezier(0.2,0.6,0.2,1) both;">Personal domain</div>
      <h1 style="font-family: var(--font-heading); font-weight: 700; font-size: clamp(56px, 10vw, 140px); line-height: 0.98; letter-spacing: -0.02em; margin: 0;">
        <span style="display: block; overflow: hidden; position: relative;">
          <span style="display: block; animation: lineUp 0.9s 0.25s cubic-bezier(0.2,0.7,0.2,1) both;">Puia</span>
          <span style="position: absolute; inset: 0; background: var(--color-accent); animation: blockIn 1.1s 0.1s cubic-bezier(0.6,0,0.3,1) both;"></span>
        </span>
        <span style="display: block; overflow: hidden; position: relative;">
          <span style="display: block; animation: lineUp 0.9s 0.4s cubic-bezier(0.2,0.7,0.2,1) both;">Chhakchhuak</span>
          <span style="position: absolute; inset: 0; background: var(--color-accent); animation: blockIn 1.1s 0.25s cubic-bezier(0.6,0,0.3,1) both;"></span>
        </span>
      </h1>
      <div style="height: 2px; background: var(--color-accent); margin: 40px 0; transform-origin: left; animation: drawRule 0.9s 0.6s cubic-bezier(0.2,0.6,0.2,1) both;"></div>
      <p style="font-size: clamp(18px, 2.2vw, 26px); line-height: 1.45; max-width: 34ch; margin: 0; animation: rise 0.8s 0.75s cubic-bezier(0.2,0.6,0.2,1) both;">Designer of interfaces, builder of front ends. Yes, that email was really from me.</p>
    </div>
  </main>
  <footer style="display: flex; justify-content: space-between; align-items: baseline; padding: 24px 40px; border-top: 2px solid var(--color-divider); animation: rise 0.8s 0.9s cubic-bezier(0.2,0.6,0.2,1) both;">
    <a href="mailto:puia@puia.me" style="font-size: 15px; letter-spacing: 0.06em; text-decoration: none; border-bottom: 2px solid var(--color-accent); padding-bottom: 2px;" style-hover="color: var(--color-accent);">puia@puia.me</a>
    <span style="font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-neutral-600);">Write anytime</span>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;showDate&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Header&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const d = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return { today: (this.props.showDate ?? true) ? `${months[d.getMonth()]} ${d.getFullYear()}` : '' };
  }
}
</script>
</body>
</html>
